name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  DOCKER_BUILDKIT: 1

jobs:
  # ==========================================================================
  # Detect if this is a Release-Please PR (lightweight check)
  # ==========================================================================
  detect-release-pr:
    name: Detect Release PR
    runs-on: ubuntu-latest
    outputs:
      is_release_pr: ${{ steps.check.outputs.is_release_pr }}
      should_skip_heavy: ${{ steps.check.outputs.should_skip_heavy }}
    steps:
      - name: Check if release PR
        id: check
        run: |
          IS_RELEASE_PR="false"
          SHOULD_SKIP_HEAVY="false"

          # Check 1: Actor is a known release bot (common patterns)
          # The PAT user name is typically the GitHub username of the token owner
          ACTOR="${{ github.actor }}"
          if [[ "$ACTOR" == *"release"* ]] || [[ "$ACTOR" == *"bot"* ]]; then
            IS_RELEASE_PR="true"
            SHOULD_SKIP_HEAVY="true"
            echo "::notice::Detected release bot actor: $ACTOR"
          fi

          # Check 2: For pull requests, check if only CHANGELOG and version files changed
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Get the list of changed files from the PR
            CHANGED_FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "${{ github.event.pull_request.url }}/files" | \
              jq -r '.[].filename')
            
            # Check if all changed files are only release-related
            ALL_RELEASE_FILES=true
            for file in $CHANGED_FILES; do
              case "$file" in
                CHANGELOG.md|.release-please-manifest.json|package.json|release-please-config.json)
                  # These are expected for release PRs
                  ;;
                *)
                  ALL_RELEASE_FILES=false
                  break
                  ;;
              esac
            done
            
            if [ "$ALL_RELEASE_FILES" = true ] && [ -n "$CHANGED_FILES" ]; then
              SHOULD_SKIP_HEAVY="true"
              echo "::notice::Release PR detected: only release-related files changed"
            fi
          fi

          echo "is_release_pr=$IS_RELEASE_PR" >> $GITHUB_OUTPUT
          echo "should_skip_heavy=$SHOULD_SKIP_HEAVY" >> $GITHUB_OUTPUT

  # ==========================================================================
  # Lint Job - Code quality checks (always run)
  # ==========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./backend
        run: npx eslint src

  # ==========================================================================
  # Format Check Job - Prettier (always run)
  # ==========================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  # ==========================================================================
  # Type Check Job - TypeScript validation (always run)
  # ==========================================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run TypeScript type check
        working-directory: ./backend
        run: npx tsc --noEmit

  # ==========================================================================
  # Build Docker Images Job - Skip for Release PRs
  # ==========================================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    # Skip this job for release PRs to save compute
    if: needs.detect-release-pr.outputs.should_skip_heavy != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BOT_NAME=${{ secrets.NEXT_PUBLIC_BOT_NAME }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Build and push monitoring image
        uses: docker/build-push-action@v6
        with:
          context: ./infrastructure/monitoring
          file: ./infrastructure/monitoring/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/monitoring:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/monitoring:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/monitoring:latest
          cache-from: type=gha,scope=monitoring
          cache-to: type=gha,mode=max,scope=monitoring

  # ==========================================================================
  # Security Scan Job - Always run (lightweight)
  # ==========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (backend)
        working-directory: ./backend
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ==========================================================================
  # Test Job - Skip for Release PRs
  # ==========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip this job for release PRs to save compute
    if: needs.detect-release-pr.outputs.should_skip_heavy != 'true'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run tests
        working-directory: ./backend
        run: npx vitest run
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

  # ==========================================================================
  # CI Summary Job - Handles skipped jobs correctly
  # ==========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [detect-release-pr, lint, format, type-check, build-docker, security-scan, test]
    if: always()

    steps:
      - name: Check CI status
        id: check
        run: |
          FAILED=""
          SKIPPED=""
          IS_RELEASE_PR="${{ needs.detect-release-pr.outputs.is_release_pr }}"
          SHOULD_SKIP="${{ needs.detect-release-pr.outputs.should_skip_heavy }}"

          # For lint, format, type-check, security-scan - always require success
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::lint job failed"
            FAILED="${FAILED}lint,"
          fi
          if [ "${{ needs.format.result }}" != "success" ]; then
            echo "::error::format job failed"
            FAILED="${FAILED}format,"
          fi
          if [ "${{ needs.type-check.result }}" != "success" ]; then
            echo "::error::type-check job failed"
            FAILED="${FAILED}type-check,"
          fi
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "::error::security-scan job failed"
            FAILED="${FAILED}security-scan,"
          fi

          # For heavy jobs (build-docker, test) - allow skipped if it's a release PR
          BUILD_DOCKER_RESULT="${{ needs.build-docker.result }}"
          TEST_RESULT="${{ needs.test.result }}"

          if [ "$BUILD_DOCKER_RESULT" == "failure" ]; then
            echo "::error::build-docker job failed"
            FAILED="${FAILED}build-docker,"
          elif [ "$BUILD_DOCKER_RESULT" == "skipped" ]; then
            if [ "$SHOULD_SKIP" == "true" ]; then
              echo "::notice::build-docker skipped for release PR (expected)"
              SKIPPED="${SKIPPED}build-docker,"
            else
              echo "::error::build-docker was unexpectedly skipped"
              FAILED="${FAILED}build-docker,"
            fi
          fi

          if [ "$TEST_RESULT" == "failure" ]; then
            echo "::error::test job failed"
            FAILED="${FAILED}test,"
          elif [ "$TEST_RESULT" == "skipped" ]; then
            if [ "$SHOULD_SKIP" == "true" ]; then
              echo "::notice::test skipped for release PR (expected)"
              SKIPPED="${SKIPPED}test,"
            else
              echo "::error::test was unexpectedly skipped"
              FAILED="${FAILED}test,"
            fi
          fi

          if [ -n "$FAILED" ]; then
            echo "failed_jobs=${FAILED%,}" >> $GITHUB_OUTPUT
            exit 1
          fi

          if [ -n "$SKIPPED" ]; then
            echo "Lightweight CI passed (skipped: ${SKIPPED%,})"
          else
            echo "All CI checks passed successfully!"
          fi

      - name: Send Telegram notification on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_JOBS: ${{ steps.check.outputs.failed_jobs }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi
          MESSAGE="🔴 *BuhBot CI Failed*%0A%0A❌ Jobs: ${FAILED_JOBS}%0A%0A📦 Commit: \`${COMMIT_SHA:0:7}\`%0A👤 Author: $ACTOR%0A🔗 [View logs]($RUN_URL)"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            -d "text=${MESSAGE}"
