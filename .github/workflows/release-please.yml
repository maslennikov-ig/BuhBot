# Release Please: creates/updates the release PR (CHANGELOG + version).
# If you see "GitHub Actions is not permitted to create or approve pull requests",
# enable Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests".
# See docs/infrastructure/release-process.md (Troubleshooting).
#
# IMPORTANT: This workflow uses a PAT (secrets.RELEASE_BOT_PAT) instead of GITHUB_TOKEN
# to ensure that the PRs it creates trigger CI runs. The PAT must have:
# - repo scope (full control)
# - workflow scope (to trigger deploy.yml)
name: Release Please

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write # Required to trigger deploy.yml

concurrency:
  group: release-please
  cancel-in-progress: false # Never cancel release processing

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI
        # Only wait for CI when triggered by workflow_run (not manual dispatch)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            // Wait for CI workflow to complete
            const headSha = context.payload.workflow_run.head_sha;
            console.log('Checking CI for commit:', headSha);

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: headSha,
              status: 'completed',
              per_page: 1
            });
            if (runs.workflow_runs.length > 0) {
              const conclusion = runs.workflow_runs[0].conclusion;
              console.log('CI conclusion:', conclusion);
              if (conclusion !== 'success') {
                core.setFailed('CI workflow failed, skipping release');
              }
            }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use PAT to ensure commits appear as from the bot user
          token: ${{ secrets.RELEASE_BOT_PAT }}

      # Release Please handles the logic of whether to create a release
      # based on conventional commits (feat:, fix:, etc.)
      # No need to manually check for code changes
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Use PAT instead of GITHUB_TOKEN so that the PRs created trigger CI
          token: ${{ secrets.RELEASE_BOT_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Get the SHA of the release from release-please outputs
      # This is the commit that was released (the merge commit of the Release PR)
      - name: Get Release SHA
        id: release_info
        if: steps.release.outputs.releases_created == 'true'
        run: |
          # Use the sha output from release-please-action
          # This is the commit that was tagged/released
          RELEASE_SHA="${{ steps.release.outputs.sha }}"
          echo "release_sha=$RELEASE_SHA" >> $GITHUB_OUTPUT
          echo "Release SHA: $RELEASE_SHA"
          echo "Tag name: ${{ steps.release.outputs.tag_name }}"

      - name: Trigger Production Deploy
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Get the SHA to deploy - use the release-please output sha
            // This is the commit that was actually released (merged Release PR)
            const releaseSha = '${{ steps.release_info.outputs.release_sha }}';
            console.log('Triggering deploy for SHA:', releaseSha);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                sha: releaseSha,
                skip_approval: 'false'
              }
            });
