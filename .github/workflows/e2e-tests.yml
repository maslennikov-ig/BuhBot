name: E2E Tests

# DISABLED - Requires fixes before enabling
# TODO: Fix working directory and playwright config path
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Run tests matching tag (optional)'
        required: false
        type: string

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  BACKEND_PORT: 3001
  FRONTEND_PORT: 3000

jobs:
  # ==========================================================================
  # E2E Test Job
  # ==========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Disabled - needs fixes
    if: false

    services:
      # PostgreSQL database service
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: buhbot
          POSTGRES_PASSWORD: buhbot_test
          POSTGRES_DB: buhbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U buhbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis service for queues
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # -------------------------------------------------------------------------
      # Checkout code
      # -------------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Setup Node.js and pnpm
      # -------------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      # -------------------------------------------------------------------------
      # Install root dependencies
      # -------------------------------------------------------------------------
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      # -------------------------------------------------------------------------
      # Install Playwright browsers
      # -------------------------------------------------------------------------
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      # -------------------------------------------------------------------------
      # Setup Backend
      # -------------------------------------------------------------------------
      - name: Setup Backend
        working-directory: ./backend
        run: |
          # Create .env file for testing
          cat > .env << EOF
          NODE_ENV=development
          PORT=${{ env.BACKEND_PORT }}

          # DEV MODE - bypass Supabase auth
          DEV_MODE=true
          DEV_USER_EMAIL=admin@buhbot.local

          # Database
          DATABASE_URL=postgresql://buhbot:buhbot_test@localhost:5432/buhbot_test
          DIRECT_URL=postgresql://buhbot:buhbot_test@localhost:5432/buhbot_test

          # Redis
          REDIS_HOST=localhost
          REDIS_PORT=6379

          # Supabase (required for client initialization)
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY=placeholder

          # Telegram (optional for E2E)
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          BOT_USERNAME=test_bot
          TELEGRAM_WEBHOOK_SECRET=test_secret

          # Security (required)
          JWT_SECRET=test_jwt_secret_for_e2e_tests
          ENCRYPTION_SECRET=test_encryption_secret_for_e2e

          # Logging
          LOG_LEVEL=error
          EOF

      # -------------------------------------------------------------------------
      # Install Backend dependencies
      # -------------------------------------------------------------------------
      - name: Install backend dependencies
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      # -------------------------------------------------------------------------
      # Generate Prisma client and setup database
      # -------------------------------------------------------------------------
      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: ./backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://buhbot:buhbot_test@localhost:5432/buhbot_test
          DIRECT_URL: postgresql://buhbot:buhbot_test@localhost:5432/buhbot_test

      - name: Seed database
        working-directory: ./backend
        run: npx prisma db seed || true
        env:
          DATABASE_URL: postgresql://buhbot:buhbot_test@localhost:5432/buhbot_test

      # -------------------------------------------------------------------------
      # Setup Frontend
      # -------------------------------------------------------------------------
      - name: Setup Frontend
        working-directory: ./frontend
        run: |
          # Create .env.local file for testing
          cat > .env.local << EOF
          # Development mode
          DEV_MODE=true

          # Supabase (placeholder for E2E with DEV_MODE)
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder

          # API URL - point to backend
          NEXT_PUBLIC_API_URL=http://localhost:${{ env.BACKEND_PORT }}

          # Site URL
          NEXT_PUBLIC_SITE_URL=http://localhost:${{ env.FRONTEND_PORT }}
          EOF

      # -------------------------------------------------------------------------
      # Install Frontend dependencies
      # -------------------------------------------------------------------------
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      # -------------------------------------------------------------------------
      # Start Backend server
      # -------------------------------------------------------------------------
      - name: Start Backend
        working-directory: ./backend
        run: |
          # Run backend in background
          nohup pnpm dev > backend.log 2>&1 &
          echo $! > backend.pid

          # Wait for backend to start
          echo "Waiting for backend to start..."
          for i in {1..60}; do
            if curl -s http://localhost:${{ env.BACKEND_PORT }}/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

          # Check if backend started
          curl -s http://localhost:${{ env.BACKEND_PORT }}/health || cat backend.log

      # -------------------------------------------------------------------------
      # Start Frontend server
      # -------------------------------------------------------------------------
      - name: Start Frontend
        working-directory: ./frontend
        run: |
          # Run frontend in background
          nohup pnpm dev > frontend.log 2>&1 &
          echo $! > frontend.pid

          # Wait for frontend to start
          echo "Waiting for frontend to start..."
          for i in {1..60}; do
            if curl -s http://localhost:${{ env.FRONTEND_PORT }} > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

          # Check if frontend started
          curl -s http://localhost:${{ env.FRONTEND_PORT }} || cat frontend.log

      # -------------------------------------------------------------------------
      # Run E2E Tests
      # -------------------------------------------------------------------------
      - name: Run E2E Tests
        working-directory: .
        run: |
          # Install e2e dependencies
          cd e2e
          pnpm install
          cd ..

          # Determine test command based on workflow_dispatch input
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            echo "Running tests matching tag: ${{ github.event.inputs.test_tag }}"
            npx playwright test --config=./e2e/playwright.config.ts --grep "${{ github.event.inputs.test_tag }}"
          else
            echo "Running all E2E tests"
            npx playwright test --config=./e2e/playwright.config.ts
          fi
        env:
          # Test environment variables
          BASE_URL: http://localhost:${{ env.FRONTEND_PORT }}
          API_URL: http://localhost:${{ env.BACKEND_PORT }}
          DEV_MODE: 'true'
          TEST_USER_EMAIL: admin@buhbot.local

      # -------------------------------------------------------------------------
      # Upload test results on failure
      # -------------------------------------------------------------------------
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e/playwright-report/
            e2e/test-results/
            backend.log
            frontend.log
          retention-days: 7

      # -------------------------------------------------------------------------
      # Upload screenshots on failure
      # -------------------------------------------------------------------------
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-screenshots
          path: e2e/test-results/**/*.png
          retention-days: 7

      # -------------------------------------------------------------------------
      # Cleanup
      # -------------------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          # Kill background processes
          if [ -f backend/backend.pid ]; then
            kill $(cat backend/backend.pid) 2>/dev/null || true
          fi
          if [ -f frontend/frontend.pid ]; then
            kill $(cat frontend/frontend.pid) 2>/dev/null || true
          fi
          # Also kill any remaining node processes on ports
          fuser -k ${{ env.BACKEND_PORT }}/tcp 2>/dev/null || true
          fuser -k ${{ env.FRONTEND_PORT }}/tcp 2>/dev/null || true

  # ==========================================================================
  # E2E Test Summary
  # ==========================================================================
  e2e-success:
    name: E2E Success
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always() && false

    steps:
      - name: Check E2E results
        run: |
          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "::error::E2E tests failed"
            exit 1
          elif [ "${{ needs.e2e-tests.result }}" == "cancelled" ]; then
            echo "::warning::E2E tests were cancelled"
            exit 1
          else
            echo "✅ E2E tests passed!"
          fi
